<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMV | CTFL-SQA</title>
  <link rel="icon" type="image/svg+xml" href="assets/code-svgrepo-com.svg">
  <meta name="description"
    content="Cliff Villanoy - Software Quality Assurance Engineer Portfolio. Specializing in structured testing, automation engineering, and quality-driven development.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="loading.css">
  <!-- Lottie Player Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
  <div class="new__bg">
    <div class="animation-container">
      <!-- Lottie container for the high-fidelity cursive handwriting -->
      <div id="lottie-hello" class="lottie-container"></div>

      <!-- Minimalist Action Prompt (Visible after animation) -->
      <div id="cta-container" class="cta-container">
        <button id="get-started" class="get-started-prompt">
          <svg viewBox="0 0 24 24" class="prompt-icon">
            <circle cx="12" cy="12" r="12" fill="#ffffff" />
            <path d="M8 12h8m-3-3l3 3-3 3" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span class="prompt-text">Get Started</span>
        </button>
      </div>
    </div>
  </div>

  <script src="loading.js"></script>
</body>
</html>
